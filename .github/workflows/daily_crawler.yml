name: Daily SmartChip Race Crawler

on:
  schedule:
    - cron: '0 2 * * *'  # 매일 오전 2시 (UTC 기준 = 한국시간 오전 11시)
  workflow_dispatch:      # 수동 실행도 가능하게

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v3

    - name: 📥 Restore state file (last_checked_id.json)
      uses: actions/download-artifact@v3
      with:
        name: crawler-state
        path: .
      continue-on-error: true

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🧪 Install dependencies
      run: |
        pip install -r requirements.txt

    - name: 🚀 Run race crawler
      run: |
        python utils/races_crawler.py

    - name: 💾 Save state file (last_checked_id.json)
      uses: actions/upload-artifact@v3
      with:
        name: crawler-state
        path: last_checked_id.json
