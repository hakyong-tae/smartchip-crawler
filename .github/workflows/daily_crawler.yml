name: Daily SmartChip Crawler

on:
  schedule:
    - cron: '0 16 * * *' # 매일 KST 새벽 1시 (UTC 16시)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Install ChromeDriver
        run: |
          sudo apt install -y chromium-chromedriver
  
      - name: Cleanup old SmartChip JSON (Keep today only)
        run: |
          TODAY=$(date -u +"%Y-%m-%d" -d "+9 hours")
          echo "Today's file: events_${TODAY}.json"
          find output -type f -name "events_*.json" ! -name "events_${TODAY}.json" -exec rm {} +
          echo "Old SmartChip JSON files removed."

      - name: Run crawler
        run: |
          set -e
          python utils/races_crawler.py
          
      - name: Commit and push if there are changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git commit -m "[Auto] Update SmartChip events json `date '+%Y-%m-%d %H:%M'`" || echo "No changes to commit"
          git push
