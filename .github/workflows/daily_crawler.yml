name: Daily SmartChip Race Crawler

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-22.04

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v3

    - name: 📆 Set CURRENT_DATE environment variable
      run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: 🧹 Delete old output files
      run: rm -f output/events_*.json || true

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🧪 Install dependencies
      run: pip install -r requirements.txt

    - name: 🚀 Run SmartChip crawler
      run: |
        python utils/races_crawler.py ${{ env.CURRENT_DATE }}

    - name: 📁 Move file to output folder
      run: |
        mkdir -p output
        mv events_${{ env.CURRENT_DATE }}.json output/

    - name: ✅ Commit and push result
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add output/events_${{ env.CURRENT_DATE }}.json
        git commit -m "Add events_${{ env.CURRENT_DATE }}.json"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
