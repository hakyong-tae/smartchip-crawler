name: Daily SmartChip Race Crawler

on:
  schedule:
    - cron: '0 2 * * *'  # 매일 오전 11시 KST
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  crawl:
    runs-on: ubuntu-22.04

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v3.6.0

    - name: 📆 Set CURRENT_DATE environment variable
      run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: 🧹 Delete old events_*.json files
      run: rm -f events_*.json || true

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4.9.1
      with:
        python-version: '3.10'

    - name: 🧪 Install dependencies
      run: |
        pip install -r requirements.txt

    - name: 🚀 Run SmartChip crawler
      run: |
        python utils/races_crawler.py ${{ env.CURRENT_DATE }}

    - name: 💾 Upload today's result
      uses: actions/upload-artifact@f9a31e7e3e3b06f4bfb1e94cf8b9e1d7f9db1c8d
      with:
        name: smartchip-events-${{ env.CURRENT_DATE }}
        path: events_${{ env.CURRENT_DATE }}.json
