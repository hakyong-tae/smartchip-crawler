name: Daily SmartChip Race Crawler

on:
  schedule:
    - cron: '0 2 * * *'  # 매일 오전 11시 KST (2시 UTC)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v3

    - name: 📆 Set CURRENT_DATE env
      run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: 🧹 Delete old JSON files
      run: rm -f events_*.json || true

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🧪 Install dependencies
      run: |
        pip install -r requirements.txt

    - name: 🚀 Run race crawler
      run: |
        python utils/races_crawler.py ${{ env.CURRENT_DATE }}
        
    - name: 💾 Upload today's JSON
      uses: actions/upload-artifact@f640b9f7aaef6b7e23255d93d6cfdb6d48d2ea1d
      with:
        name: smartchip-events-${{ env.CURRENT_DATE }}
        path: events_${{ env.CURRENT_DATE }}.json

